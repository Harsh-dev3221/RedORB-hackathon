ai_usage_summary: |
  AI tools were used for architecture discussion, code review, debugging,
  documentation, and offline rubric-development assistance. The final ranking
  step is deterministic local Python/NumPy code over precomputed artifacts.
  No hosted LLM, external API, GPU, or network call is used during ranking.

methodology_summary: |
  VERDICT ranks candidates with a deterministic J x C x A pipeline. J executes
  a compiled JD rubric over evidence sentences and structured career signals;
  C penalizes contradictions, impossible timelines, unsupported expert claims,
  and keyword-stuffing patterns; A uses Redrob behavioral/logistics signals
  such as response rate, recency, open-to-work, notice period, location, and
  verification. Candidate embeddings are precomputed offline, while the
  constrained rank step runs CPU-only in about 14 seconds on the 100K pool.

